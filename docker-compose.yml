# =============================================================================
# Docker Compose — SOLO para desarrollo local.
# Levanta base de datos + backend + frontend con un comando:  docker compose up
#
# Esto NO afecta el despliegue en producción:
#   - Backend  -> Cloud Run usa backend/Dockerfile (producción)
#   - Frontend -> Vercel construye desde frontend/ (ignora Dockerfiles)
#   - BD       -> Neon (vía DATABASE_URL); aquí usamos Postgres en contenedor
# =============================================================================
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chilate
      POSTGRES_PASSWORD: chilate
      POSTGRES_DB: chilate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chilate"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      # Zona horaria del servidor: así "a partir del día siguiente" y las fechas
      # de los descuentos coinciden con la hora local del usuario (El Salvador).
      TZ: America/El_Salvador
      DATABASE_URL: postgresql://chilate:chilate@db:5432/chilate?schema=public
      JWT_SECRET: dev-secret-cambia-esto-en-produccion
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:5173
      PORT: 8080
      # Google Cloud Storage para imágenes (bucket privado, servido por proxy)
      GCS_BUCKET: ecommerce-chilate
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp.json
      PUBLIC_API_URL: http://localhost:8080/api
      # Correos (Gmail SMTP). Define GMAIL_USER y GMAIL_APP_PASSWORD en un
      # archivo .env en la raíz (NO se sube a git). Si faltan, se omite el envío.
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # node_modules y dist viven DENTRO del contenedor (volúmenes anónimos):
      # así no se escriben en la carpeta del host (que iCloud sincroniza y
      # duplica como "dist/prisma 2", rompiendo el build de Nest con ENOTEMPTY).
      - /app/node_modules
      - /app/dist
      # Credenciales de la service account (montadas de solo lectura)
      - ./backend/ecommercechilate-73d70610d476.json:/secrets/gcp.json:ro

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
