name: CI (calidad)

# Corre en cada push a main y en cada Pull Request hacia main.
# Verifica formato, lint y tipos en frontend y backend ANTES de mezclar/desplegar.
# No despliega nada: el deploy vive en deploy-backend.yml (backend) y Vercel (frontend).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend · formato + lint + tipos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Formato (prettier)
        working-directory: frontend
        run: npm run format:check

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Tipos (tsc)
        working-directory: frontend
        run: npm run typecheck

  backend:
    name: Backend · formato + lint + tipos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      # Genera el cliente de Prisma para que tsc conozca los tipos de los modelos.
      - name: Generar cliente Prisma
        working-directory: backend
        run: npx prisma generate

      - name: Formato (prettier)
        working-directory: backend
        run: npm run format:check

      - name: Lint (eslint)
        working-directory: backend
        run: npm run lint

      - name: Tipos (tsc)
        working-directory: backend
        run: npm run typecheck
