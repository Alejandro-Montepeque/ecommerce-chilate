name: Desplegar backend (Cloud Run)

# Se ejecuta al hacer push a main que toque el backend, o manualmente desde
# la pestaña Actions (botón "Run workflow"). Cada corrida es visible en Actions.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  SERVICE: chilate-api
  REGION: us-central1 # cámbialo si usas otra región
  REPO: cloud-run-source-deploy # repo de Artifact Registry (ya existe)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Migraciones + seeders contra Neon (rápido; npm cacheado por el paso anterior).
      - name: Migraciones + seeders (Prisma)
        working-directory: backend
        run: |
          npm ci
          npx prisma migrate deploy
          npx prisma generate
          npm run prisma:seed
        env:
          # url (pooled) para el seed; directUrl (directa) para migrate deploy.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      # Login de Docker contra Artifact Registry (usa la SA ya autenticada).
      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      # Construye la imagen CON caché de capas (GitHub Actions cache). Si no
      # cambian package.json / prisma/, las capas de npm ci y prisma generate se
      # reutilizan → la build tarda segundos en vez de minutos.
      - name: Construir y subir imagen
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          # Sin caché gha: en builds multi-stage con mode=max provoca el error
          # "COPY --from: /app/dist not found". Sin ella el build es fiable y
          # sigue siendo rápido (un solo npm ci + deploy por imagen, sin Cloud Build).
          provenance: false
          sbom: false

      # Despliega SOLO la imagen ya construida (no reconstruye en Cloud Build).
      - name: Desplegar en Cloud Run
        run: |
          cat > "$RUNNER_TEMP/env.yaml" <<EOF
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          DIRECT_URL: "${{ secrets.DIRECT_URL }}"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"
          JWT_EXPIRES_IN: "7d"
          CORS_ORIGINS: "${{ secrets.CORS_ORIGINS }}"
          PUBLIC_API_URL: "${{ secrets.PUBLIC_API_URL }}"
          GCS_BUCKET: "${{ secrets.GCS_BUCKET }}"
          GCS_PROJECT_ID: "${{ secrets.GCP_PROJECT_ID }}"
          GMAIL_USER: "${{ secrets.GMAIL_USER }}"
          GMAIL_APP_PASSWORD: "${{ secrets.GMAIL_APP_PASSWORD }}"
          TZ: "America/El_Salvador"
          EOF

          gcloud run deploy "$SERVICE" \
            --image "$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/$REPO/$SERVICE:${{ github.sha }}" \
            --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --env-vars-file "$RUNNER_TEMP/env.yaml" \
            --quiet

      - name: Mostrar URL del servicio
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format 'value(status.url)'
